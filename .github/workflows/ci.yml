name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 3

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: 'root'
          MYSQL_ALLOW_EMPTY_PASSWORD: 'true'
          MYSQL_CHARACTER_SET_SERVER: 'utf8mb4'
          MYSQL_COLLATION_SERVER: 'utf8mb4_unicode_ci'
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        include:
          # Moodle 5.2 — referência principal (runchecks apenas uma vez por branch)
          - {moodle-branch: 'MOODLE_502_STABLE', php: '8.3', database: 'pgsql', runchecks: 'all'}
          - {moodle-branch: 'MOODLE_502_STABLE', php: '8.3', database: 'mariadb'}
          # Moodle 5.1 — versão mínima suportada
          - {moodle-branch: 'MOODLE_501_STABLE', php: '8.3', database: 'pgsql'}
          - {moodle-branch: 'MOODLE_501_STABLE', php: '8.3', database: 'mariadb'}

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, mysqli, gd, xml, dom, json, zip, bcmath, intl, soap, sodium
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install moodle-plugin-ci
        # Activate theme_lore during install so PHPUnit and Behat run with it active.
        run: |
          moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1 \
            --add-config '$CFG->theme = "lore";'
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() && matrix.runchecks == 'all' }}
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true
        if: ${{ !cancelled() && matrix.runchecks == 'all' }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ !cancelled() && matrix.runchecks == 'all' }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Validate Plugin
        if: ${{ !cancelled() && matrix.runchecks == 'all' }}
        run: moodle-plugin-ci validate

      - name: PHPDoc checks
        if: ${{ !cancelled() && matrix.runchecks == 'all' }}
        run: moodle-plugin-ci phpdoc

      - name: Mustache Lint
        if: ${{ !cancelled() && matrix.runchecks == 'all' }}
        run: moodle-plugin-ci mustache

      - name: Grunt tasks
        # continue-on-error: themes use SCSS patterns (nested selectors, variables)
        # that Moodle's stylelint config may flag. AMD builds are required only
        # from Phase 3 onwards; this step will be a hard failure once amd/src/ exists.
        continue-on-error: true
        if: ${{ !cancelled() && matrix.runchecks == 'all' }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit

      - name: Behat tests
        if: ${{ !cancelled() }}
        # --suite default ensures tests run with the theme declared in config.php.
        run: moodle-plugin-ci behat --profile chrome --suite default

      - name: Mark cancelled jobs as failed
        if: ${{ cancelled() }}
        run: exit 1
